<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NXC · tryhackme style</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;600&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0a0e1a;
      color: #c8d6e5;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      padding: 16px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .app {
      max-width: 920px;
      width: 100%;
      background: rgba(14, 20, 40, 0.92);
      border: 1px solid rgba(0, 240, 255, 0.08);
      border-radius: 16px;
      padding: 20px 24px 30px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.8), 0 0 60px rgba(0, 240, 255, 0.02);
    }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #0d1422; border-radius: 12px; }
    ::-webkit-scrollbar-thumb { background: #00f0ff; border-radius: 12px; box-shadow: 0 0 8px #00f0ff33; }

    /* header – tryhackme style */
    .header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 14px;
      border-bottom: 2px solid rgba(0, 240, 255, 0.06);
      margin-bottom: 16px;
    }
    .title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      background: linear-gradient(135deg, #00e5ff, #7c4dff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }
    .title small {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      background: none;
      -webkit-text-fill-color: #7c4dff;
      opacity: 0.6;
      margin-left: 6px;
      letter-spacing: 0.5px;
    }

    /* vars – only TARGET, USER, PASS (no HASH, no DOMAIN) */
    .vars {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 16px;
      padding: 6px 16px;
      margin-bottom: 18px;
      background: rgba(10, 14, 30, 0.5);
      border: 1px solid rgba(0, 240, 255, 0.05);
      border-radius: 12px;
      align-items: center;
    }
    .var-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: #7c4dff;
    }
    .var-item label {
      color: #5a7a9a;
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .var-item input {
      background: rgba(10, 14, 30, 0.8);
      border: 1px solid rgba(0, 240, 255, 0.12);
      border-radius: 6px;
      padding: 2px 10px;
      color: #00f0ff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      width: 90px;
      outline: none;
      transition: 0.15s;
    }
    .var-item input:focus {
      border-color: #7c4dff;
      box-shadow: 0 0 12px rgba(124, 77, 255, 0.1);
    }

    .main { width: 100%; }
    
    .cmd-block {
      background: rgba(10, 14, 30, 0.5);
      border: 1px solid rgba(0, 240, 255, 0.04);
      border-radius: 12px;
      padding: 10px 16px;
      margin-bottom: 8px;
      transition: 0.15s;
    }
    .cmd-block:hover {
      border-color: rgba(0, 240, 255, 0.12);
      background: rgba(10, 14, 30, 0.7);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    .code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: #00f0ff;
      word-break: break-all;
    }
    .code .hl { color: #7c4dff; font-weight: 600; }

    @media (max-width: 600px) {
      .var-item input { width: 60px; }
      .title { font-size: 1.2rem; }
      .app { padding: 14px 14px 20px; }
    }
  </style>
</head>
<body>
<div class="app">
  <!-- header -->
  <header class="header">
    <div class="title">NXC <small>tryhackme</small></div>
  </header>

  <!-- variables: TARGET, USER, PASS (no HASH, no DOMAIN) -->
  <div class="vars" id="vars">
    <div class="var-item"><label>TARGET</label><input id="vTARGET" value="192.168.1.100" /></div>
    <div class="var-item"><label>USER</label><input id="vUSER" value="Administrator" /></div>
    <div class="var-item"><label>PASS</label><input id="vPASS" value="P@ssw0rd" /></div>
  </div>

  <!-- main content – only commands, no headers -->
  <main class="main" id="main"></main>
</div>

<script>
  (function(){
    const CMD = [
      'powershell -c type $env:APPDATA\\Microsoft\\Windows\\PowerShell\\PSReadLine\\ConsoleHost_history.txt',
      'nxc smb {TARGET} -u {USER} -p {PASS} -M powershell_history',
      'nxc smb {TARGET} -u {USER} -p {PASS} -M keepass_discover',
      'nxc smb {TARGET} -u {USER} -p {PASS} -M keepass_trigger -o ACTION=ALL',
      'nxc smb {TARGET} -u {USER} -p {PASS} --loggedon-users',
      'nxc smb {TARGET} -u {USER} -p {PASS} --sessions',
      'nxc smb {TARGET} -u {USER} -p {PASS} --local-groups',
      'nxc smb {TARGET} -u {USER} -p {PASS} --shares',
      'nxc smb {TARGET} -u {USER} -p {PASS} --pass-pol',
      'nxc smb {TARGET} -u {USER} -p {PASS} --users',
      'nxc smb {TARGET} -u {USER} -p {PASS} --groups',
      'nxc ldap {TARGET} -u {USER} -p {PASS} --users',
      'nxc ldap {TARGET} -u {USER} -p {PASS} --groups',
      'nxc ldap {TARGET} -u {USER} -p {PASS} --password-not-required',
      'nxc ldap {TARGET} -u {USER} -p {PASS} --admin-count',
      'nxc ldap {TARGET} -u {USER} -p {PASS} -M get-desc-users',
      'nxc ldap {TARGET} -u {USER} -p {PASS} -M get-info-users',
      'nxc ldap {TARGET} -u {USER} -p {PASS} -M get-unixUserPassword',
      'nxc ldap {TARGET} -u {USER} -p {PASS} -M get-userPassword',
      'nxc ldap {TARGET} -u {USER} -p {PASS} -M laps',
      'nxc ldap {TARGET} -u {USER} -p {PASS} -M user-desc -o KEYWORDS=pwd,admin',
      'nxc ldap {TARGET} -u {USER} -p {PASS} -M maq',
      'nxc ldap {TARGET} -u {USER} -p {PASS} -M pre2k'
    ];

    const $ = id => document.getElementById(id);
    const v = { 
      TARGET: $('vTARGET'), USER: $('vUSER'), PASS: $('vPASS'),
      DC: $('vTARGET')
    };
    const main = $('main');

    function getVars() {
      return { 
        TARGET: v.TARGET.value, USER: v.USER.value, PASS: v.PASS.value,
        DC: v.TARGET.value,
        LHOST: '10.10.10.5', LPORT: '4444', SHARE: 'ADMIN$', DOMAIN: 'CONTOSO', HASH: 'aad3b435b51404eeaad3b435b51404ee'
      };
    }
    function interp(cmd) {
      const vars = getVars();
      return cmd.replace(/{(\w+)}/g, (_, k) => vars[k] || `{${k}}`);
    }

    function render() {
      let html = '';
      CMD.forEach(cmd => {
        const cmdText = interp(cmd);
        html += `
          <div class="cmd-block">
            <div class="code">${cmdText}</div>
          </div>
        `;
      });
      main.innerHTML = html;
    }

    document.querySelectorAll('.var-item input').forEach(inp => inp.addEventListener('input', render));

    render();
  })();
</script>
</body>
</html>
